<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مولد الوسائط بالذكاء الاصطناعي</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.78);
            --card-border: rgba(255, 255, 255, 0.15);
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --accent-primary: #6366f1;
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --input-bg: rgba(15, 23, 42, 0.8);
            --input-border: rgba(255, 255, 255, 0.18);
            --radius-lg: 18px;
            --radius-md: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; 
            color: var(--text-primary); 
            line-height: 1.6; 
            min-height: 100vh;
            
            /* خلفية الموقع من ملف logo.jpg */
            background-color: var(--bg-color);
            background-image: linear-gradient(rgba(15, 23, 42, 0.75), rgba(15, 23, 42, 0.85)), 
                              url('logo.jpg');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            background-attachment: fixed;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

        /* Header */
        header { 
            margin-bottom: 40px; 
            text-align: center; 
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .main-logo {
            max-width: 90px;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.4));
            margin-bottom: 8px;
        }

        .section-logo {
            max-height: 55px;
            width: auto;
            object-fit: contain;
            margin: 0 auto 15px auto;
            display: block;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
        }

        h1 { 
            font-size: 34px; 
            font-weight: 800; 
            letter-spacing: -0.5px; 
            background: linear-gradient(to right, #ffffff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 12px rgba(0,0,0,0.5);
        }

        .subtitle { font-size: 15px; color: var(--text-secondary); font-weight: 400; }

        /* Rate Limit Banner */
        .rate-banner {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 12px 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            gap: 20px;
            font-size: 14px;
        }

        .rate-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .rate-info .icon {
            font-size: 18px;
        }

        .rate-info .label {
            color: var(--text-secondary);
            font-weight: 600;
        }

        .rate-info .count {
            color: #60a5fa;
            font-weight: 700;
            margin-right: 4px;
        }

        .rate-info .reset-time {
            color: var(--text-secondary);
            font-size: 12px;
        }

        /* Main Content Layout */
        .main-content { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        @media (max-width: 900px) { .main-content { grid-template-columns: 1fr; } }

        .section { 
            background: var(--card-bg); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border); 
            border-radius: var(--radius-lg); 
            padding: 30px; 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
        }

        .section.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .section h2 { 
            font-size: 20px; 
            font-weight: 600; 
            margin-bottom: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            color: var(--text-primary);
        }

        .section-icon { font-size: 22px; }

        .info-box { 
            background-color: rgba(99, 102, 241, 0.18); 
            border-right: 4px solid var(--accent-primary); 
            padding: 12px 16px; 
            border-radius: 8px; 
            margin-bottom: 24px; 
            color: #e0e7ff; 
            font-size: 13px; 
            line-height: 1.5; 
            text-align: center; 
        }

        /* Forms & Inputs */
        .form-group { margin-bottom: 20px; }

        label { 
            display: block; 
            font-size: 12px; 
            font-weight: 600; 
            margin-bottom: 8px; 
            color: var(--text-secondary); 
            text-transform: uppercase; 
            letter-spacing: 0.8px; 
        }

        input, textarea, select { 
            width: 100%; 
            padding: 12px 14px; 
            border: 1px solid var(--input-border); 
            border-radius: var(--radius-md); 
            font-size: 14px; 
            font-family: inherit; 
            background-color: var(--input-bg); 
            color: var(--text-primary); 
            transition: all 0.2s ease; 
        }

        input:focus, textarea:focus, select:focus { 
            outline: none; 
            border-color: var(--accent-primary); 
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.35);
            background-color: rgba(15, 23, 42, 0.95);
        }

        textarea { resize: vertical; min-height: 100px; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }

        /* Buttons */
        .button-group { display: flex; gap: 12px; margin-top: 24px; }

        button { 
            padding: 12px 20px; 
            border-radius: var(--radius-md); 
            font-size: 13px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.2s; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            border: none;
        }

        .btn-primary { 
            background: var(--accent-gradient); 
            color: white; 
            flex: 2; 
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:hover { 
            opacity: 0.95;
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary { 
            background-color: rgba(255, 255, 255, 0.12); 
            color: var(--text-primary); 
            flex: 1; 
        }

        .btn-secondary:hover { 
            background-color: rgba(255, 255, 255, 0.2); 
        }

        /* Results & Status */
        .result-section { 
            margin-top: 30px; 
            padding: 20px; 
            background-color: var(--input-bg); 
            border: 1px solid var(--card-border); 
            border-radius: var(--radius-md); 
            display: none; 
        }

        .result-section.show { display: block; }

        .result-section h3 { 
            font-size: 13px; 
            font-weight: 600; 
            margin-bottom: 15px; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            color: var(--text-secondary); 
            text-align: center; 
        }

        .status { 
            padding: 12px 16px; 
            border-radius: 8px; 
            margin-bottom: 15px; 
            font-size: 13px; 
            font-weight: 500; 
            border-right: 4px solid; 
            word-break: break-all; 
        }

        .status.pending { background-color: rgba(245, 158, 11, 0.15); border-right-color: #f59e0b; color: #fbbf24; }
        .status.success { background-color: rgba(16, 185, 129, 0.15); border-right-color: #10b981; color: #34d399; }
        .status.error { background-color: rgba(239, 68, 68, 0.15); border-right-color: #ef4444; color: #f87171; }
        .status.processing { background-color: rgba(59, 130, 246, 0.15); border-right-color: #3b82f6; color: #60a5fa; }
        .status.rate-limited { background-color: rgba(168, 85, 247, 0.15); border-right-color: #a855f7; color: #c084fc; }

        .result-image, .result-video { 
            width: 100%; 
            max-width: 100%; 
            border-radius: 8px; 
            margin-top: 15px; 
            border: 1px solid var(--card-border); 
        }

        .result-link { 
            display: block; 
            text-align: center; 
            margin-top: 15px; 
            padding: 12px 16px; 
            background: var(--accent-gradient); 
            color: white; 
            text-decoration: none; 
            border-radius: var(--radius-md); 
            font-weight: 600; 
            font-size: 13px; 
            text-transform: uppercase; 
            transition: opacity 0.2s; 
        }

        .result-link:hover { opacity: 0.9; }

        .spinner { 
            display: inline-block; 
            position: relative; 
            width: 14px; 
            height: 14px; 
            vertical-align: middle; 
            margin-left: 6px; 
        }

        .spinner::after { 
            content: " "; 
            display: block; 
            width: 12px; 
            height: 12px; 
            margin: 1px; 
            border-radius: 50%; 
            border: 2px solid #ffffff; 
            border-color: #ffffff transparent #ffffff transparent; 
            animation: spinner 1.2s linear infinite; 
        }

        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <img src="logo.jpg" alt="Logo" class="main-logo">
            <h1>مولد الوسائط بالذكاء الاصطناعي</h1>
            <p class="subtitle">توليد الصور والفيديوهات بضغطة زر</p>
        </header>

        <!-- شريط عرض حد الطلبات -->
        <div class="rate-banner">
            <div class="rate-info">
                <span class="icon">🖼️</span>
                <span class="label">الصور:</span>
                <span class="count" id="imageCountDisplay">0</span>/<span>3</span>
                <span class="reset-time" id="imageResetTime"></span>
            </div>
            <div class="rate-info">
                <span class="icon">🎬</span>
                <span class="label">الفيديو:</span>
                <span class="count" id="videoCountDisplay">0</span>/<span>2</span>
                <span class="reset-time" id="videoResetTime"></span>
            </div>
        </div>

        <div class="main-content">
            <!-- قسم الصور -->
            <div class="section" id="imageSection">
                <img src="logo.jpg" alt="Logo" class="section-logo">

                <h2>
                    <span class="section-icon">🖼️</span>
                    توليد الصور
                </h2>

                <div class="info-box">
                    اكتب وصفاً للصورة التي تريد توليدها وسيقوم الذكاء الاصطناعي برسمها.
                </div>

                <form onsubmit="generateImage(event)">
                    <div class="form-group">
                        <label for="imagePrompt">الوصف</label>
                        <textarea id="imagePrompt" placeholder="مثال: قطة تلعب في حديقة خضراء وقت الغروب" required maxlength="500"></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="imageMode">الجودة</label>
                            <select id="imageMode">
                                <option value="lite">قياسي (Standard)</option>
                                <option value="pro">احترافي (Professional)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="imageCount">عدد الصور (1-4)</label>
                            <input type="number" id="imageCount" value="1" min="1" max="4">
                        </div>
                    </div>

                    <div class="button-group">
                        <button type="reset" class="btn-secondary">مسح</button>
                        <button type="submit" class="btn-primary" id="imageSubmitBtn">توليد</button>
                    </div>
                </form>

                <div id="imageResult" class="result-section">
                    <h3>النتيجة</h3>
                    <div id="imageStatus" class="status"></div>
                    <div id="imageContent"></div>
                </div>
            </div>

            <!-- قسم الفيديو -->
            <div class="section" id="videoSection">
                <img src="logo.jpg" alt="Logo" class="section-logo">

                <h2>
                    <span class="section-icon">🎬</span>
                    توليد الفيديو
                </h2>

                <div class="info-box">
                    اكتب وصفاً لتوليد فيديو حركي رائع بالذكاء الاصطناعي.
                </div>

                <form onsubmit="generateVideo(event)">
                    <div class="form-group">
                        <label for="videoPrompt">الوصف</label>
                        <textarea id="videoPrompt" placeholder="مثال: أمواج البحر تضرب الشاطئ الرملي" required maxlength="500"></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="videoDuration">المدة (بالثواني)</label>
                            <select id="videoDuration">
                                <option value="5">5 ثوانٍ</option>
                                <option value="8">8 ثوانٍ</option>
                                <option value="15">15 ثانية</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="videoAspect">أبعاد الفيديو</label>
                            <select id="videoAspect">
                                <option value="9:16">9:16 (عمودي - Portrait)</option>
                                <option value="16:9">16:9 (عريض - Widescreen)</option>
                                <option value="1:1">1:1 (مربع - Square)</option>
                                <option value="4:3">4:3 (قياسي - Standard)</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="videoMode">الجودة</label>
                            <select id="videoMode">
                                <option value="pro">احترافي (Professional)</option>
                                <option value="lite">قياسي (Standard)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="videoSound">الصوت</label>
                            <select id="videoSound">
                                <option value="on">مفعل</option>
                                <option value="off">معطل</option>
                            </select>
                        </div>
                    </div>

                    <div class="button-group">
                        <button type="reset" class="btn-secondary">مسح</button>
                        <button type="submit" class="btn-primary" id="videoSubmitBtn">توليد</button>
                    </div>
                </form>

                <div id="videoResult" class="result-section">
                    <h3>النتيجة</h3>
                    <div id="videoStatus" class="status"></div>
                    <div id="videoContent"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = '/api';

        // ==========================================
        // نظام Rate Limiting على الفرونت إند
        // ==========================================
        const RateTracker = {
            image: { count: 0, windowStart: 0, limit: 3, windowMs: 60000 },
            video: { count: 0, windowStart: 0, limit: 2, windowMs: 60000 },

            canRequest(type) {
                const tracker = this[type];
                const now = Date.now();

                // إعادة ضبط إذا انتهت النافذة
                if (now - tracker.windowStart > tracker.windowMs) {
                    tracker.count = 0;
                    tracker.windowStart = now;
                }

                return tracker.count < tracker.limit;
            },

            increment(type) {
                const tracker = this[type];
                const now = Date.now();

                if (now - tracker.windowStart > tracker.windowMs) {
                    tracker.count = 1;
                    tracker.windowStart = now;
                } else {
                    tracker.count++;
                }
            },

            getRemaining(type) {
                const tracker = this[type];
                const now = Date.now();
                if (now - tracker.windowStart > tracker.windowMs) {
                    return tracker.limit;
                }
                return Math.max(0, tracker.limit - tracker.count);
            },

            getResetTime(type) {
                const tracker = this[type];
                const now = Date.now();
                const elapsed = now - tracker.windowStart;
                const remaining = Math.max(0, tracker.windowMs - elapsed);
                if (remaining === 0) return '';
                const seconds = Math.ceil(remaining / 1000);
                return `(${seconds}ث)`;
            }
        };

        // تحديث عرض العداد كل ثانية
        function updateRateDisplay() {
            document.getElementById('imageCountDisplay').textContent = 
                RateTracker.image.count || 0;
            document.getElementById('imageResetTime').textContent = 
                RateTracker.getResetTime('image');
            
            document.getElementById('videoCountDisplay').textContent = 
                RateTracker.video.count || 0;
            document.getElementById('videoResetTime').textContent = 
                RateTracker.getResetTime('video');

            // تعطيل الأزرار عند الوصول للحد
            const imageBtn = document.getElementById('imageSubmitBtn');
            const videoBtn = document.getElementById('videoSubmitBtn');

            if (!RateTracker.canRequest('image')) {
                imageBtn.disabled = true;
                imageBtn.textContent = `انتظر ${RateTracker.getResetTime('image')}`;
                document.getElementById('imageSection').classList.add('disabled');
            } else {
                imageBtn.disabled = false;
                imageBtn.textContent = 'توليد';
                document.getElementById('imageSection').classList.remove('disabled');
            }

            if (!RateTracker.canRequest('video')) {
                videoBtn.disabled = true;
                videoBtn.textContent = `انتظر ${RateTracker.getResetTime('video')}`;
                document.getElementById('videoSection').classList.add('disabled');
            } else {
                videoBtn.disabled = false;
                videoBtn.textContent = 'توليد';
                document.getElementById('videoSection').classList.remove('disabled');
            }
        }

        setInterval(updateRateDisplay, 1000);
        updateRateDisplay();

        // ==========================================
        // Image Generation Logic
        // ==========================================
        async function generateImage(e) {
            e.preventDefault();

            // تحقق من Rate Limit على الفرونت إند
            if (!RateTracker.canRequest('image')) {
                const resultSection = document.getElementById('imageResult');
                const statusDiv = document.getElementById('imageStatus');
                resultSection.classList.add('show');
                statusDiv.innerHTML = `⏳ تم تجاوز الحد. انتظر ${RateTracker.getResetTime('image')}`;
                statusDiv.className = 'status rate-limited';
                return;
            }

            const prompt = document.getElementById('imagePrompt').value;
            const mode = document.getElementById('imageMode').value;
            const count = parseInt(document.getElementById('imageCount').value);

            // تحقق من المدخلات على الفرونت إند
            if (count < 1 || count > 4) {
                const resultSection = document.getElementById('imageResult');
                const statusDiv = document.getElementById('imageStatus');
                resultSection.classList.add('show');
                statusDiv.innerHTML = '✗ عدد الصور يجب أن يكون بين 1 و 4.';
                statusDiv.className = 'status error';
                return;
            }

            if (!prompt || prompt.length > 500) {
                const resultSection = document.getElementById('imageResult');
                const statusDiv = document.getElementById('imageStatus');
                resultSection.classList.add('show');
                statusDiv.innerHTML = '✗ الوصف مطلوب ولا يتجاوز 500 حرف.';
                statusDiv.className = 'status error';
                return;
            }

            const resultSection = document.getElementById('imageResult');
            const statusDiv = document.getElementById('imageStatus');
            const contentDiv = document.getElementById('imageContent');

            resultSection.classList.add('show');
            statusDiv.innerHTML = '<span class="spinner"></span> جاري إرسال الطلب...';
            statusDiv.className = 'status processing';
            contentDiv.innerHTML = '';

            RateTracker.increment('image');
            updateRateDisplay();

            try {
                const payload = { prompt: prompt, mode: mode, n: count };

                const response = await fetch(`${API_BASE_URL}/generate-image`, {
                    method: 'POST',
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.status === 429) {
                    statusDiv.innerHTML = '⏳ تم تجاوز الحد من الخادم. انتظر دقيقة واحدة.';
                    statusDiv.className = 'status rate-limited';
                    return;
                }

                if (data.status === 1 || data.code === 1) {
                    throw new Error(data.message || 'خطأ من السيرفر أثناء توليد الصورة');
                }

                const instantImageUrl = data.data?.task_result?.images?.[0]?.url || data.task_result?.images?.[0]?.url || data.images?.[0]?.url;
                if (instantImageUrl) {
                    showImageSuccess(instantImageUrl, statusDiv, contentDiv);
                    return;
                }

                const taskId = data.data?.task_id || data.task_id || data.data?.taskId || data.taskId;
                if (!taskId) throw new Error(data.message || 'لم يتم استلام رقم المهمة');

                await pollImageResult(taskId, statusDiv, contentDiv);
            } catch (error) {
                statusDiv.innerHTML = `✗ خطأ: ${error.message}`;
                statusDiv.className = 'status error';
            }
        }

        async function pollImageResult(taskId, statusDiv, contentDiv, attempts = 0) {
            if (attempts > 60) {
                statusDiv.innerHTML = '⏱ انتهت مهلة الانتظار. السيرفر مزدحم حالياً.';
                statusDiv.className = 'status pending';
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/query-image?t=${Date.now()}`, {
                    method: 'POST',
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ taskId: taskId })
                });

                const data = await response.json();
                
                const rawStatus = data.data?.task_status || data.task_status || data.data?.status || data.status || '';
                const status = String(rawStatus).toLowerCase();

                if (data.status === 1 || data.code === 1 || status === 'failed' || status === 'error') {
                    statusDiv.innerHTML = `✗ فشل إنشاء الصورة: ${data.message || 'خطأ غير معروف'}`;
                    statusDiv.className = 'status error';
                    return;
                }

                if (status === 'succeed' || status === 'success' || status === '0') {
                    const imageUrl = data.data?.task_result?.images?.[0]?.url || 
                                     data.task_result?.images?.[0]?.url || 
                                     data.data?.images?.[0]?.url || 
                                     data.data?.imageUrl ||
                                     data.images?.[0]?.url;
                    
                    if (imageUrl) {
                        showImageSuccess(imageUrl, statusDiv, contentDiv);
                    } else {
                        statusDiv.innerHTML = '✓ مكتمل ولكن لم يتم العثور على رابط الصورة';
                        statusDiv.className = 'status error';
                    }
                    return;
                } else {
                    statusDiv.innerHTML = `<span class="spinner"></span> Processing... (${attempts + 1}/60) - ${status || 'starting'}`;
                    statusDiv.className = 'status processing';
                    setTimeout(() => pollImageResult(taskId, statusDiv, contentDiv, attempts + 1), 5000); 
                }
            } catch (error) {
                statusDiv.innerHTML = `✗ خطأ في الاستعلام: ${error.message}`;
                statusDiv.className = 'status error';
            }
        }

        function showImageSuccess(url, statusDiv, contentDiv) {
            statusDiv.innerHTML = '✓ تم إنشاء الصورة بنجاح';
            statusDiv.className = 'status success';
            contentDiv.innerHTML = `
                <img src="${url}" alt="Generated Image" class="result-image" style="width: 100%; border-radius: 8px;">
                <a href="${url}" target="_blank" class="result-link">تحميل الصورة</a>
            `;
        }

        // ==========================================
        // Video Generation Logic
        // ==========================================
        async function generateVideo(e) {
            e.preventDefault();

            // تحقق من Rate Limit على الفرونت إند
            if (!RateTracker.canRequest('video')) {
                const resultSection = document.getElementById('videoResult');
                const statusDiv = document.getElementById('videoStatus');
                resultSection.classList.add('show');
                statusDiv.innerHTML = `⏳ تم تجاوز الحد. انتظر ${RateTracker.getResetTime('video')}`;
                statusDiv.className = 'status rate-limited';
                return;
            }

            const prompt = document.getElementById('videoPrompt').value;
            const duration = document.getElementById('videoDuration').value;
            const aspect = document.getElementById('videoAspect').value;
            const mode = document.getElementById('videoMode').value;
            const sound = document.getElementById('videoSound').value;

            // تحقق من المدخلات على الفرونت إند
            const allowedDurations = ['5', '8', '15'];
            if (!allowedDurations.includes(duration)) {
                const resultSection = document.getElementById('videoResult');
                const statusDiv = document.getElementById('videoStatus');
                resultSection.classList.add('show');
                statusDiv.innerHTML = '✗ مدة الفيديو يجب أن تكون 5 أو 8 أو 15 ثانية فقط.';
                statusDiv.className = 'status error';
                return;
            }

            if (!prompt || prompt.length > 500) {
                const resultSection = document.getElementById('videoResult');
                const statusDiv = document.getElementById('videoStatus');
                resultSection.classList.add('show');
                statusDiv.innerHTML = '✗ الوصف مطلوب ولا يتجاوز 500 حرف.';
                statusDiv.className = 'status error';
                return;
            }

            const resultSection = document.getElementById('videoResult');
            const statusDiv = document.getElementById('videoStatus');
            const contentDiv = document.getElementById('videoContent');

            resultSection.classList.add('show');
            statusDiv.innerHTML = '<span class="spinner"></span> جاري إرسال الطلب...';
            statusDiv.className = 'status processing';
            contentDiv.innerHTML = '';

            RateTracker.increment('video');
            updateRateDisplay();

            try {
                const payload = {
                    prompt: prompt,
                    duration: String(duration),
                    aspect_ratio: aspect,
                    sound: sound,
                    mode: mode
                };

                const response = await fetch(`${API_BASE_URL}/generate-video`, {
                    method: 'POST',
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.status === 429) {
                    statusDiv.innerHTML = '⏳ تم تجاوز الحد من الخادم. انتظر دقيقة واحدة.';
                    statusDiv.className = 'status rate-limited';
                    return;
                }

                if (data.status === 1 || data.code === 1) {
                    throw new Error(data.message || 'خطأ من السيرفر أثناء توليد الفيديو');
                }

                const instantVideoUrl = data.data?.task_result?.videos?.[0]?.url || data.task_result?.videos?.[0]?.url;
                if (instantVideoUrl) {
                    showVideoSuccess(instantVideoUrl, statusDiv, contentDiv);
                    return;
                }

                const taskId = data.data?.task_id || data.task_id;
                if (!taskId) throw new Error(data.message || 'لم يتم استلام رقم المهمة');

                await pollVideoResult(taskId, statusDiv, contentDiv);
            } catch (error) {
                statusDiv.innerHTML = `✗ خطأ: ${error.message}`;
                statusDiv.className = 'status error';
            }
        }

        async function pollVideoResult(taskId, statusDiv, contentDiv, attempts = 0) {
            if (attempts > 80) { 
                statusDiv.innerHTML = '⏱ انتهت مهلة الانتظار. قد يستغرق الفيديو وقتاً أطول.';
                statusDiv.className = 'status pending';
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/query-video?t=${Date.now()}`, {
                    method: 'POST',
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ taskId: taskId })
                });

                const data = await response.json();
                
                const rawStatus = data.data?.task_status || data.task_status || data.data?.status || data.status || '';
                const status = String(rawStatus).toLowerCase();

                if (data.status === 1 || data.code === 1 || status === 'failed' || status === 'error') {
                    statusDiv.innerHTML = `✗ فشل إنشاء الفيديو: ${data.message || 'خطأ من السيرفر'}`;
                    statusDiv.className = 'status error';
                    return;
                }

                if (status === 'succeed' || status === 'success' || status === '0') {
                    const videoUrl = data.data?.task_result?.videos?.[0]?.url || data.task_result?.videos?.[0]?.url;
                    
                    if (videoUrl) {
                        showVideoSuccess(videoUrl, statusDiv, contentDiv);
                    } else {
                        statusDiv.innerHTML = '✓ مكتمل ولكن لم يتم العثور على رابط الفيديو';
                        statusDiv.className = 'status error';
                    }
                    return;
                } else {
                    statusDiv.innerHTML = `<span class="spinner"></span> Processing... (${attempts + 1}/80) - ${status || 'starting'}`;
                    statusDiv.className = 'status processing';
                    setTimeout(() => pollVideoResult(taskId, statusDiv, contentDiv, attempts + 1), 5000);
                }
            } catch (error) {
                statusDiv.innerHTML = `✗ خطأ في الاستعلام: ${error.message}`;
                statusDiv.className = 'status error';
            }
        }

        function showVideoSuccess(url, statusDiv, contentDiv) {
            statusDiv.innerHTML = '✓ تم إنشاء الفيديو بنجاح';
            statusDiv.className = 'status success';
            contentDiv.innerHTML = `
                <video controls autoplay loop class="result-video" style="max-height: 400px; width: 100%;">
                    <source src="${url}" type="video/mp4">
                </video>
                <a href="${url}" target="_blank" class="result-link">تحميل الفيديو</a>
            `;
        }
    </script>
</body>
</html>
